# ════════════════════════════════════════════════════════════════════
#  NGINX — Configuración Multi-Sitio
#  /etc/nginx/sites-available/rubrica.conf
#
#  Sirve DOS stacks Docker de forma simultánea:
#
#    TWENTY CRM  (stack existente, /opt/twenty/)
#      twenty.TUDOMINIO.com  →  127.0.0.1:3000
#
#    RÚBRICA  (nuevo stack, /opt/rubrica/server/)
#      app.rubrica.com.mx    →  127.0.0.1:3001  (Frontend React)
#      api.rubrica.com.mx    →  127.0.0.1:4000  (API Gateway)
#      admin.rubrica.com.mx  →  127.0.0.1:3001  (mismo frontend, rutas /admin/*)
#
#  IMPORTANTE: Editar TWENTY_DOMAIN antes de activar
# ════════════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS redirect global ───────────────────────────────────
server {
    listen 80;
    # Agregar aquí el dominio de Twenty si lo tienes
    server_name app.rubrica.com.mx api.rubrica.com.mx admin.rubrica.com.mx;
    return 301 https://$host$request_uri;
}

# ════════════════════════════════════════════════════════════════════
#  RÚBRICA
# ════════════════════════════════════════════════════════════════════

# ─── DASHBOARD DEL CLIENTE ──────────────────────────────────────────
# app.rubrica.com.mx → Frontend React (puerto 3001)
server {
    listen 443 ssl http2;
    server_name app.rubrica.com.mx;

    ssl_certificate     /etc/letsencrypt/live/rubrica.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubrica.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 100M;
    proxy_read_timeout   300s;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── API GATEWAY ────────────────────────────────────────────────────
# api.rubrica.com.mx → Node.js Gateway (puerto 4000)
server {
    listen 443 ssl http2;
    server_name api.rubrica.com.mx;

    ssl_certificate     /etc/letsencrypt/live/rubrica.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubrica.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Access-Control-Allow-Origin "https://app.rubrica.com.mx" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    client_max_body_size 100M;
    proxy_read_timeout   300s;

    location / {
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── PANEL ADMIN ────────────────────────────────────────────────────
# admin.rubrica.com.mx → mismo frontend, rutas /admin/* (puerto 3001)
server {
    listen 443 ssl http2;
    server_name admin.rubrica.com.mx;

    ssl_certificate     /etc/letsencrypt/live/rubrica.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubrica.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ⚠️  Descomentar y poner tu IP fija antes de Go Live
    # allow TU_IP_FIJA;
    # deny all;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ════════════════════════════════════════════════════════════════════
#  TWENTY CRM  (stack existente — no modificar el compose de Twenty)
#  Instrucciones:
#    1. Reemplazar "crm.TUDOMINIO.com" por el dominio real de Twenty
#    2. Obtener SSL: certbot --nginx -d crm.TUDOMINIO.com
#    3. En el docker-compose de Twenty, cambiar el puerto de
#       "0.0.0.0:3000:3000"  →  "127.0.0.1:3000:3000"
#       (para que ya no sea accesible directo desde internet)
# ════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name crm.TUDOMINIO.com;    # ← CAMBIAR
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.TUDOMINIO.com;    # ← CAMBIAR

    # Descommentar después de obtener el certificado con certbot:
    # ssl_certificate     /etc/letsencrypt/live/crm.TUDOMINIO.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.TUDOMINIO.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;
    proxy_read_timeout   300s;

    location / {
        proxy_pass         http://127.0.0.1:3000;   # Twenty CRM container
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
