## ─── HTTP → HTTPS redirect global ──────────────────────────────
server {
    listen 80;
    server_name app.rubrica.com.mx api.rubrica.com.mx admin.rubrica.com.mx;
    return 301 https://$host$request_uri;
}

## ─── DASHBOARD DEL CLIENTE ─────────────────────────────────────
## app.rubrica.com.mx → Frontend React (Velzon/Rúbrica)
server {
    listen 443 ssl http2;
    server_name app.rubrica.com.mx;

    ssl_certificate     /etc/letsencrypt/live/rubrica.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubrica.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Seguridad
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Tamaño máximo para subida de PDFs
    client_max_body_size 100M;
    proxy_read_timeout   300s;
    proxy_connect_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

## ─── API GATEWAY ────────────────────────────────────────────────
## api.rubrica.com.mx → Node.js API Gateway
server {
    listen 443 ssl http2;
    server_name api.rubrica.com.mx;

    ssl_certificate     /etc/letsencrypt/live/rubrica.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubrica.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # CORS headers
    add_header Access-Control-Allow-Origin "https://app.rubrica.com.mx" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    client_max_body_size 100M;
    proxy_read_timeout   300s;

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

## ─── PANEL DE ADMINISTRACIÓN ────────────────────────────────────
## admin.rubrica.com.mx → Frontend React (rutas /admin/*)
## Acceso restringido por IP — editar antes de usar
server {
    listen 443 ssl http2;
    server_name admin.rubrica.com.mx;

    ssl_certificate     /etc/letsencrypt/live/rubrica.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubrica.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ⚠️  IMPORTANTE: Descomentar y agregar tu IP fija antes de Go Live
    # allow TU_IP_FIJA_AQUI;
    # deny all;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3001;   # Mismo frontend, rutas /admin/* protegidas por rol
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
