# ════════════════════════════════════════════════════════════════════
#  NGINX — Configuración Multi-Sitio  rubricalo.com
#  /etc/nginx/sites-available/rubricalo.conf
#
#  Stack Rúbricalo  (nuevo, /opt/rubricalo/server/)
#    app.rubricalo.com      →  127.0.0.1:3001  (Frontend React)
#    api.rubricalo.com      →  127.0.0.1:4000  (API Gateway)
#    admin.rubricalo.com    →  127.0.0.1:3001  (Panel admin /admin/*)
#    docuseal.rubricalo.com →  127.0.0.1:3500  (DocuSeal Engine)
#
#  Twenty CRM  (existente — NO modificar su stack)
#    crm.TUDOMINIO.com      →  127.0.0.1:3000
# ════════════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name rubricalo.com app.rubricalo.com api.rubricalo.com admin.rubricalo.com docuseal.rubricalo.com;
    return 301 https://$host$request_uri;
}

# ════════════════════════════════════════════════════════════════════
#  RUBRICALO — DASHBOARD DEL CLIENTE
#  app.rubricalo.com → Frontend React Velzon (puerto 3001)
# ════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name app.rubricalo.com;

    ssl_certificate     /etc/letsencrypt/live/rubricalo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubricalo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 100M;
    proxy_read_timeout   300s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ════════════════════════════════════════════════════════════════════
#  RUBRICALO — API GATEWAY
#  api.rubricalo.com → Node.js Express (puerto 4000)
# ════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name api.rubricalo.com;

    ssl_certificate     /etc/letsencrypt/live/rubricalo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubricalo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Access-Control-Allow-Origin  "https://app.rubricalo.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    client_max_body_size 100M;
    proxy_read_timeout   300s;

    location / {
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ════════════════════════════════════════════════════════════════════
#  RUBRICALO — PANEL ADMIN
#  admin.rubricalo.com → mismo frontend, rutas /admin/* (puerto 3001)
# ════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name admin.rubricalo.com;

    ssl_certificate     /etc/letsencrypt/live/rubricalo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rubricalo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;
    proxy_read_timeout   120s;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

